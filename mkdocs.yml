site_name: homectl
site_url: https://palta-dev.github.io/homectl
repo_url: https://github.com/palta-dev/homectl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Docker Deployment: getting-started/docker.md
  - Configuration:
      - General Settings: configuration/general.md
      - Services & Groups: configuration/services.md
      - Widgets: configuration/widgets.md
  - Security:
      - Auth & Passwords: security/auth.md
      - SSRF Protection: security/ssrf.md
  - Development: development.md
